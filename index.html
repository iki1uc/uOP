<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PRM Core</title>
</head>
<body>

  <div id="prm-root">
    <div id="inst-primus"></div>
    <div id="inst-geselle"></div>
    <div id="inst-admin"></div>
  </div>

  <script type="module">
    // PRM entscheidet dynamisch
    const needPrimus = true;
    const needGeselle = true;
    const needAdmin = true;

    if (needPrimus) {
      import('./primus-core.js').then(mod => {
        mod.initPrimus(document.getElementById('inst-primus'));
      });
    }

    if (needGeselle) {
      import('./geselle-core.js').then(mod => {
        mod.initGeselle(document.getElementById('inst-geselle'));
      });
    }

    if (needAdmin) {
      import('./admin-core.js').then(mod => {
        mod.initAdmin(document.getElementById('inst-admin'));
      });
    }
  </script>

</body>
</html>
